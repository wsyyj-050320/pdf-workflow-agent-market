# Local Coral Server for development.
#   docker compose up   →   http://localhost:5555
#
# Coral launches agents as sibling Docker containers, so it needs the host
# Docker socket. It also reads a local agent registry from the mounted
# ../../coral-agents directory (each agent = a folder with coral-agent.toml).
services:
  coral-server:
    image: ghcr.io/coral-protocol/coral-server:latest
    container_name: coral-test
    ports:
      - "5555:5555"
    environment:
      - CONFIG_FILE_PATH=/config/config.toml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.toml:/config/config.toml:ro
      - ../../coral-agents:/agents:ro
    restart: unless-stopped
