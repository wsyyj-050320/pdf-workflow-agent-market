# Track 1 — Pay-Per-Call API with Anchor Escrow
# Mount: -v ./docs/coral/track-1-config.toml:/config/config.toml:ro
# Mount: -v ./coral-agents:/agents:ro

[auth]
keys = ["dev"]

[network]
allowAnyHost = true

[registry]
localAgents = ["/agents/*"]
includeCoralHomeAgents = true
localAgentRescanTimer = "5s"

[docker]
# host.docker.internal is the host from inside a Docker container on Docker Desktop
address = "host.docker.internal"
