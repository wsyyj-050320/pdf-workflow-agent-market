name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/agent-core-ts/package-lock.json
      - run: cd sdk/agent-core-ts && npm install
      - run: cd sdk/agent-core-ts && npm run typecheck
      - run: cd sdk/agent-core-ts && npm test

  typescript-api:
    name: TypeScript API (api-ts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api-ts/package-lock.json
      - run: cd api-ts && npm install
      - run: cd api-ts && npm run typecheck
      - run: cd api-ts && npm test

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm install
      - run: cd web && npm run typecheck
      - run: cd web && npm run build
        env:
          NEXT_PUBLIC_CORAL_SERVER: http://localhost:8081
          NEXT_PUBLIC_HELIUS_RPC: https://devnet.helius-rpc.com/?api-key=test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [typescript-api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install e2e deps
        run: cd e2e && npm install
      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium
      - name: Build web
        run: cd web && npm install && npm run build
        env:
          NEXT_PUBLIC_CORAL_SERVER: http://localhost:8081
          NEXT_PUBLIC_HELIUS_RPC: https://devnet.helius-rpc.com/?api-key=test
      - name: Run E2E tests
        run: cd e2e && npm test
