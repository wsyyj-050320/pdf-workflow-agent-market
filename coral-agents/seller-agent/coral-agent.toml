edition = 3

[agent]
name = "seller-agent"
version = "0.1.0"
description = "Sells data and services for SOL via Solana Pay. Responds to 'request <query>' with a payment URL, then delivers data on proof of payment."
summary = "TypeScript agent that sells on-chain data for SOL micropayments."
readme = "Receives 'request <query>' messages from other agents. Replies with a Solana Pay URL. When the buyer sends 'paid <sig> memo=<memo>', verifies on-chain and delivers the requested data."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
SELLER_WALLET = { type = "string", description = "Devnet wallet pubkey that receives payments" }
PRICE_SOL = { type = "f64", default = 0.0001, description = "Price per request in SOL" }
SERVICE = { type = "string", default = "jupiter", description = "Service to sell: jupiter | coingecko | news" }
SOLANA_RPC_URL = { type = "string", default = "", description = "Solana RPC URL" }
HELIUS_API_KEY = { type = "string", default = "", description = "Helius API key" }
JUPITER_API_KEY = { type = "string", default = "", description = "Jupiter API key for higher rate limits (free at jup.ag/developers)" }
NEWS_API_KEY = { type = "string", default = "", description = "NewsAPI key (only needed for SERVICE=news)" }

[runtimes.docker]
image = "seller-agent:0.1.0"
