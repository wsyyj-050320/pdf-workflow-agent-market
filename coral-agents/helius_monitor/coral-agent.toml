edition = 3

[agent]
name = "helius-monitor"
version = "0.1.0"
description = "Watches a Solana wallet (via Helius) over PubSub and reports confirmed payments to other agents in the session."
summary = "Solana wallet payment monitor."
readme = "Subscribes to a recipient wallet over Solana PubSub (Helius-compatible) and emits a payment-received message into the session thread when a transfer of at least the expected amount confirms."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
WALLET = { type = "string", description = "Recipient wallet pubkey to watch" }
AMOUNT_SOL = { type = "f64", default = 0.5, description = "Expected payment amount in SOL" }
RPC_URL = { type = "string", default = "", description = "Solana RPC URL (blank = derive from Helius key, else devnet)" }
WS_URL = { type = "string", default = "", description = "Solana websocket URL (blank = derive from Helius key, else devnet)" }
HELIUS_API_KEY = { type = "string", default = "", description = "Helius API key; builds mainnet URLs when RPC_URL/WS_URL are blank" }

# Run as a container (coral-server in Docker launches it via the Docker socket).
[runtimes.docker]
image = "helius-monitor:0.1.0"

# Run directly (used when coral-server runs on the host, e.g. ./gradlew run).
[runtimes.executable]
path = "python"
arguments = ["coral_agent.py"]
