edition = 3

[agent]
name = "user-proxy"
version = "0.1.0"
description = "Minimal stand-in for a human user in test sessions. Connects to Coral and idles, letting the puppet API be used to inject messages as this agent."
summary = "Idle puppet agent for test harness use."
readme = "Joins a session and blocks indefinitely, allowing the puppet API to send messages on its behalf for integration testing."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.docker]
image = "user-proxy:0.1.0"
